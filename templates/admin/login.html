{% extends "base.html" %}

{% block title %}Admin Login - Tournament Manager{% endblock %}

{% block body %}

<!-- Background Effects -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute w-96 h-96 top-1/3 left-1/4 bg-pink-500/5 rounded-full blur-3xl anim-float"></div>
    <div class="absolute w-96 h-96 bottom-0 right-1/4 bg-fuchsia-500/5 rounded-full blur-3xl anim-float" style="animation-delay:3s"></div>
</div>

<main class="relative z-10 min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md">

<!-- Logo -->
<div class="text-center mb-8 animate-in" style="--delay:0">
    <div class="relative inline-block">
        <div class="text-6xl mb-4 anim-heartbeat cursor-pointer anim-rubber">🎯</div>
        <div class="absolute inset-4 bg-fuchsia-500/10 rounded-full blur-xl anim-ripple"></div>
    </div>

    <h1 class="text-3xl font-display font-bold gradient-text anim-text-glow">
        ADMIN ACCESS
    </h1>

    <p class="typewriter font-display text-xs text-pink-400/50 tracking-[0.2em] uppercase mt-2"
       style="visibility:hidden">
        Tournament Manager Control Panel
    </p>
</div>

<!-- Error -->
{% if error %}
<div class="mb-4 p-3 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-sm text-center animate-in from-left" style="--delay:0">
    {{ error }}
</div>
{% endif %}

<!-- Login Form -->
<form method="POST" action="/admin/login"
      class="p-8 rounded-3xl card-gradient glass neon-border animate-in scale border-glow card-shine"
      style="--delay:1">

    <div class="mb-6">
        <label class="text-sm font-medium text-slate-300 mb-2 block">Username</label>
        <input type="text"
               name="username"
               required
               autocomplete="username"
               class="input-field"
               placeholder="Enter username">
    </div>

    <div class="mb-8">
        <label class="text-sm font-medium text-slate-300 mb-2 block">Password</label>
        <input type="password"
               name="password"
               required
               autocomplete="current-password"
               class="input-field"
               placeholder="Enter password">
    </div>

    <button type="submit" class="btn-primary w-full text-center justify-center">
        🔐 Sign In
    </button>

</form>

<!-- Back Link -->
<div class="text-center mt-6 animate-in" style="--delay:3">
    <a href="/"
       class="text-slate-500 hover:text-slate-300 text-sm transition-colors">
        ← Back to Public Site
    </a>
</div>

</div>
</main>

{% endblock %}
